            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
            overflow: hidden;
        }
        .plastic-pocket::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .binder-spine {

<script>
        function openDetails(name) {
            const drawer = document.getElementById('details-drawer');
            const overlay = document.getElementById('drawer-overlay');
            const detailName = document.getElementById('detail-name');
            const detailImg = document.querySelector('#detail-card-img img');
            
            detailName.innerText = name;
            
            // Simplified logic for demo image swap
            const cardImages = {
                'Charizard': 'https://images.unsplash.com/photo-1613771404721-1f92d799e49f?q=80&w=500',
                'Blastoise': 'https://images.unsplash.com/photo-1627371343354-206e8b2b62d3?q=80&w=500'
            };
            
            if (cardImages[name]) {
                detailImg.src = cardImages[name];
            }

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                drawer.classList.remove('translate-y-full');
            }, 10);
        }

        function closeDetails() {
            const drawer = document.getElementById('details-drawer');
            const overlay = document.getElementById('drawer-overlay');
            
            drawer.classList.add('translate-y-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }
